<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 560" width="720" height="560" role="img" aria-label="Aerial view of cultivated farmland with a tractor spreading organic fertilizer">
  <defs>
    <linearGradient id="soil" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3f6b3a"/>
      <stop offset="1" stop-color="#1f3d24"/>
    </linearGradient>
  </defs>
  <rect width="720" height="560" fill="#dff0e2"/>
  <rect width="720" height="200" fill="#cfe8d6"/>
  <!-- field stripes in perspective -->
  <g>
    <polygon points="0,200 720,200 720,560 0,560" fill="url(#soil)"/>
    <g stroke="#5a8a4f" stroke-width="3" opacity="0.6">
      <line x1="360" y1="200" x2="120" y2="560"/>
      <line x1="360" y1="200" x2="240" y2="560"/>
      <line x1="360" y1="200" x2="360" y2="560"/>
      <line x1="360" y1="200" x2="480" y2="560"/>
      <line x1="360" y1="200" x2="600" y2="560"/>
      <line x1="360" y1="200" x2="0" y2="470"/>
      <line x1="360" y1="200" x2="720" y2="470"/>
    </g>
    <g stroke="#74a866" stroke-width="2" opacity="0.45">
      <line x1="40" y1="280" x2="680" y2="280"/>
      <line x1="10" y1="360" x2="710" y2="360"/>
      <line x1="0" y1="450" x2="720" y2="450"/>
    </g>
  </g>
  <!-- distant trees / hills -->
  <g fill="#9ccf9f">
    <ellipse cx="120" cy="195" rx="130" ry="34"/>
    <ellipse cx="540" cy="190" rx="170" ry="30"/>
  </g>
  <!-- tractor -->
  <g transform="translate(300,300)">
    <rect x="34" y="20" width="70" height="22" rx="4" fill="#3a3f47"/>
    <rect x="96" y="-6" width="40" height="40" rx="5" fill="#15803d"/>
    <rect x="100" y="0" width="30" height="18" rx="3" fill="#bfe3c8"/>
    <rect x="40" y="6" width="60" height="20" rx="4" fill="#166534"/>
    <circle cx="120" cy="52" r="22" fill="#1f2937"/><circle cx="120" cy="52" r="9" fill="#9ca3af"/>
    <circle cx="52" cy="54" r="14" fill="#1f2937"/><circle cx="52" cy="54" r="5" fill="#9ca3af"/>
    <!-- spread arc -->
    <g fill="#facc15">
      <circle cx="20" cy="40" r="2.5"/><circle cx="6" cy="52" r="2.5"/>
      <circle cx="-8" cy="44" r="2.5"/><circle cx="14" cy="58" r="2.5"/>
      <circle cx="-2" cy="64" r="2.5"/><circle cx="-18" cy="58" r="2.5"/>
    </g>
  </g>
  <!-- sun -->
  <circle cx="610" cy="80" r="40" fill="#fde047" opacity="0.85"/>
</svg>
