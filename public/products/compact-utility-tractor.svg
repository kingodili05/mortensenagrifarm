<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 450" width="600" height="450" role="img" aria-label="Green and steel compact utility farm tractor with front loader">
  <rect width="600" height="450" fill="#eef2ee"/>
  <rect y="340" width="600" height="110" fill="#d8e0d6"/>
  <!-- rear body -->
  <rect x="300" y="180" width="150" height="90" rx="10" fill="#15803d"/>
  <!-- cab -->
  <rect x="320" y="110" width="110" height="80" rx="8" fill="#166534"/>
  <rect x="332" y="122" width="86" height="56" rx="5" fill="#bfe3c8"/>
  <!-- hood -->
  <rect x="150" y="210" width="160" height="60" rx="8" fill="#15803d"/>
  <rect x="150" y="232" width="160" height="10" fill="#0f5a2c"/>
  <!-- loader arm -->
  <path d="M210 220 80 300" stroke="#334155" stroke-width="14" stroke-linecap="round"/>
  <path d="M80 300l-50 6 6 30 60-10Z" fill="#facc15"/>
  <!-- wheels -->
  <circle cx="200" cy="340" r="40" fill="#1f2937"/><circle cx="200" cy="340" r="15" fill="#9ca3af"/>
  <circle cx="400" cy="340" r="62" fill="#1f2937"/><circle cx="400" cy="340" r="24" fill="#9ca3af"/>
</svg>
