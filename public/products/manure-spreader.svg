<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 450" width="600" height="450" role="img" aria-label="Green PTO-driven hydraulic manure spreader trailer">
  <rect width="600" height="450" fill="#eef2ee"/>
  <rect y="330" width="600" height="120" fill="#d8e0d6"/>
  <!-- hopper body -->
  <path d="M110 180h330l30 120H90Z" fill="#15803d"/>
  <path d="M110 180h330l8 30H102Z" fill="#166534"/>
  <!-- contents -->
  <path d="M120 178c30-18 90-18 120 0 30-16 80-16 110 0 20-10 50-8 60 2H120Z" fill="#5a4632"/>
  <!-- beaters at rear -->
  <g stroke="#334155" stroke-width="6">
    <line x1="470" y1="210" x2="510" y2="250"/>
    <line x1="470" y1="250" x2="510" y2="210"/>
  </g>
  <circle cx="490" cy="230" r="10" fill="#facc15"/>
  <!-- drawbar -->
  <rect x="40" y="250" width="80" height="12" rx="6" fill="#334155"/>
  <!-- wheels -->
  <circle cx="200" cy="330" r="46" fill="#1f2937"/><circle cx="200" cy="330" r="18" fill="#9ca3af"/>
  <circle cx="360" cy="330" r="46" fill="#1f2937"/><circle cx="360" cy="330" r="18" fill="#9ca3af"/>
</svg>
