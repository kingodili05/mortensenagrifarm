<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 450" width="600" height="450" role="img" aria-label="Pull-behind broadcast fertilizer spreader with stainless hopper">
  <rect width="600" height="450" fill="#eef2ee"/>
  <rect y="330" width="600" height="120" fill="#d8e0d6"/>
  <!-- stainless hopper (inverted cone) -->
  <path d="M180 150h240l-50 130H230Z" fill="#cbd5e1"/>
  <path d="M180 150h240l-12 30H192Z" fill="#e2e8f0"/>
  <path d="M230 280h140l-30 40h-80Z" fill="#94a3b8"/>
  <!-- contents -->
  <ellipse cx="300" cy="156" rx="118" ry="12" fill="#9a7444"/>
  <!-- frame -->
  <rect x="60" y="300" width="120" height="12" rx="6" fill="#334155"/>
  <rect x="240" y="320" width="120" height="14" rx="6" fill="#334155"/>
  <!-- spinner disc -->
  <ellipse cx="300" cy="345" rx="70" ry="18" fill="#facc15"/>
  <circle cx="300" cy="345" r="8" fill="#334155"/>
  <!-- flotation wheels -->
  <circle cx="200" cy="345" r="40" fill="#1f2937"/><circle cx="200" cy="345" r="15" fill="#9ca3af"/>
  <circle cx="430" cy="345" r="40" fill="#1f2937"/><circle cx="430" cy="345" r="15" fill="#9ca3af"/>
</svg>
